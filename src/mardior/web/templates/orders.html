{% extends "base.html" %}
{% block title %}Órdenes{% endblock %}
{% block content %}
<div class="page-header">
    <h1>📦 Órdenes Shopify</h1>
    <button class="btn btn-primary" hx-post="/api/sync/orders" hx-target="#sync-result" hx-swap="innerHTML">🔄 Sincronizar</button>
</div>
<div id="sync-result"></div>

<div class="table-container" hx-get="/api/orders" hx-trigger="load" hx-swap="innerHTML">
    <p class="text-muted">Cargando...</p>
</div>

<script>
document.body.addEventListener('htmx:beforeSwap', function(evt) {
    if (evt.detail.target.id === 'sync-result') {
        if (evt.detail.xhr.responseURL && evt.detail.xhr.responseURL.includes('/api/sync/orders')) {
            var data = JSON.parse(evt.detail.xhr.response);
            evt.detail.target.innerHTML = `<div class="alert alert-success">✅ ${data.synced} órdenes sincronizadas</div>`;
            setTimeout(function() { evt.detail.target.innerHTML = ''; }, 3000);
        }
        return;
    }
    if (evt.detail.target.id !== 'sync-result' && evt.detail.xhr.responseURL && evt.detail.xhr.responseURL.includes('/api/orders')) {
        var data = JSON.parse(evt.detail.xhr.response);
        var html = '<table class="table"><thead><tr><th>#</th><th>Cliente</th><th>Total</th><th>Fulfillment</th><th>Tracking</th></tr></thead><tbody>';
        data.orders.forEach(function(o) {
            var trackings = (o.fulfillments || []).map(function(f) { return f.tracking_number || ''; }).join(', ') || '—';
            var badgeClass = {fulfilled: 'badge-success', unfulfilled: 'badge-warning', in_transit: 'badge-info'}[o.fulfillment_status] || 'badge';
            html += `<tr>
                <td>#${o.order_number}</td>
                <td><small>${o.customer_name || o.customer_email}</small></td>
                <td>$${o.total_price}</td>
                <td><span class="badge ${badgeClass}">${o.fulfillment_status || '—'}</span></td>
                <td><small>${trackings}</small></td>
            </tr>`;
        });
        html += '</tbody></table>';
        evt.detail.target.innerHTML = html;
        evt.detail.shouldSwap = false;
    }
});
</script>
{% endblock %}
