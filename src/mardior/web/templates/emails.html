{% extends "base.html" %}
{% block title %}Emails{% endblock %}
{% block content %}
<div class="page-header">
    <h1 id="page-title">📧 Todos los Emails</h1>
    <div class="filters">
        <select class="form-input filter-select" id="filter-select" onchange="changeFilter(this.value)">
            <option value="">Todos</option>
            <option value="attention">⚠️ Requieren Atencion</option>
            <option value="responded">✅ Respondidos</option>
            <option value="pending">❓ Pendientes</option>
            <option value="tracking">📦 Tracking</option>
            <option value="complaint">❗ Quejas</option>
            <option value="refund">💰 Devoluciones</option>
            <option value="influencer">📢 Influencers</option>
            <option value="ads">📯 Publicidad</option>
            <option value="other">📥 Otros</option>
        </select>
    </div>
</div>

<div id="emails-container">
    <p class="text-muted">Cargando...</p>
</div>

<div id="reply-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <span>📧 Responder</span>
            <button class="modal-close" onclick="closeReply()">&times;</button>
        </div>
        <div id="reply-email-info" class="modal-body"></div>
        <textarea id="reply-text" class="form-input reply-textarea" rows="5" placeholder="Escribe tu respuesta..."></textarea>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeReply()">Cancelar</button>
            <button class="btn btn-primary" id="reply-send-btn" onclick="sendReply()">Enviar Respuesta</button>
        </div>
    </div>
</div>

<script>
var currentFilter = '';

function changeFilter(val) {
    currentFilter = val;
    var titles = { '': '📧 Todos los Emails', attention: '⚠️ Requieren Atencion', responded: '✅ Respondidos', pending: '❓ Pendientes', tracking: '📦 Tracking', complaint: '❗ Quejas', refund: '💰 Devoluciones', influencer: '📢 Influencers', ads: '📯 Publicidad', other: '📥 Otros' };
    document.getElementById('page-title').textContent = titles[val] || '📧 Emails';
    var url = '/api/emails';
    if (val) url += '?filter=' + val;
    htmx.ajax('GET', url, {target: '#emails-container', swap: 'innerHTML'});
}

function setFilterFromUrl() {
    var params = new URLSearchParams(window.location.search);
    var f = params.get('filter') || '';
    document.getElementById('filter-select').value = f;
    changeFilter(f);
}

function renderEmails(data) {
    var html = '';
    var responded = [];
    var attention = [];
    var others = [];

    data.emails.forEach(function(e) {
        if (e.response_sent) {
            responded.push(e);
        } else if (e.needs_attention) {
            attention.push(e);
        } else {
            others.push(e);
        }
    });

    var urgencies = {
        complaint: { icon: '❗', label: 'Queja', cls: 'urgency-high' },
        refund: { icon: '💰', label: 'Devolucion', cls: 'urgency-high' },
        distributor: { icon: '🏬', label: 'Distribuidor', cls: 'urgency-mid' },
        partnership: { icon: '🤝', label: 'Partnership', cls: 'urgency-mid' },
        influencer: { icon: '📢', label: 'Influencer', cls: 'urgency-mid' },
    };

    var trackingStatuses = { delivered: '✅ Entregado', in_transit: '🚚 Transito', exception: '⚠️ Excepcion', unknown: '❓?' };

    function cardHTML(e) {
        var u = urgencies[e.classification] || { icon: '📥', label: e.classification || 'Otro', cls: '' };
        var dateStr = e.received_at ? e.received_at.substring(0, 16).replace('T', ' ') : '';
        var summary = e.summary || (e.body_text ? e.body_text.substring(0, 200) : '');
        var reason = e.attention_reason ? '<span class="badge badge-warning attn-reason">' + e.attention_reason + '</span>' : '';
        var responseStatus = e.response_sent ? '<span class="badge badge-success">✅ Respondido</span>' : '';
        var trackingBadge = (e.classification === 'tracking' && e.tracking_status) ? '<span class="badge badge-info">' + (trackingStatuses[e.tracking_status] || e.tracking_status) + '</span>' : '';
        var orderLink = e.linked_order_id ? '<a href="/orders" class="badge email-order">#' + e.linked_order_id + '</a>' : '';
        var replyBtn = (!e.response_sent && e.needs_attention) ? '<button class="btn btn-sm btn-primary" onclick="openReply(' + e.id + ', \'' + (e.from_name || e.from_address).replace(/'/g, "\\'") + '\', \'' + (e.subject || '').replace(/'/g, "\\'") + '\')">Responder</button>' : '';
        return '<div class="email-card ' + u.cls + '">' +
            '<div class="email-header">' +
                '<span class="email-from">' + (e.from_name || e.from_address) + '</span>' +
                '<span class="email-date">' + dateStr + '</span>' +
            '</div>' +
            '<div class="email-subject">' + (e.subject || '(sin asunto)') + '</div>' +
            '<div class="email-summary">' + summary + '</div>' +
            '<div class="email-footer">' +
                '<span class="badge badge-info email-cat">' + u.icon + ' ' + u.label + '</span>' +
                trackingBadge +
                reason +
                responseStatus +
                orderLink +
                replyBtn +
            '</div>' +
        '</div>';
    }

    if (currentFilter !== '') {
        data.emails.forEach(function(e) { html += cardHTML(e); });
    } else {
        if (responded.length > 0) {
            html += '<div class="email-section"><span class="section-icon">✅</span><span class="section-title">Respondidos Automaticamente</span><span class="section-count">' + responded.length + '</span></div>';
            responded.forEach(function(e) { html += cardHTML(e); });
        }
        if (attention.length > 0) {
            html += '<div class="email-section"><span class="section-icon">⚠️</span><span class="section-title">Requieren Atencion</span><span class="section-count">' + attention.length + '</span></div>';
            attention.forEach(function(e) { html += cardHTML(e); });
        }
        if (others.length > 0) {
            html += '<div class="email-section"><span class="section-icon">📥</span><span class="section-title">Otros</span><span class="section-count">' + others.length + '</span></div>';
            others.forEach(function(e) { html += cardHTML(e); });
        }
    }

    if (data.emails.length === 0) {
        html = '<div class="card"><p class="text-muted">No hay emails</p></div>';
    }

    return html;
}

document.body.addEventListener('htmx:beforeSwap', function(evt) {
    if (evt.detail.target.id !== 'emails-container') return;
    if (evt.detail.xhr.responseURL && evt.detail.xhr.responseURL.includes('/api/emails')) {
        var data = JSON.parse(evt.detail.xhr.response);
        evt.detail.target.innerHTML = renderEmails(data);
        evt.detail.shouldSwap = false;
    }
});

var replyEmailId = null;
function openReply(id, from, subject) {
    replyEmailId = id;
    document.getElementById('reply-email-info').innerHTML = '<strong>Para:</strong> ' + from + '<br><strong>Asunto:</strong> ' + subject;
    document.getElementById('reply-text').value = '';
    document.getElementById('reply-modal').style.display = 'flex';
}

function closeReply() {
    replyEmailId = null;
    document.getElementById('reply-modal').style.display = 'none';
}

function sendReply() {
    var text = document.getElementById('reply-text').value.trim();
    if (!text) return;
    var btn = document.getElementById('reply-send-btn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    var form = new FormData();
    form.append('response_body', text);
    fetch('/api/emails/' + replyEmailId + '/reply', {
        method: 'POST',
        headers: { 'X-CSRF-Token': getCookie('mardior_csrf') },
        body: form,
    }).then(function(r) { return r.json(); }).then(function() {
        closeReply();
        changeFilter(currentFilter);
    }).catch(function() {
        alert('Error al enviar respuesta');
        btn.disabled = false;
        btn.textContent = 'Enviar Respuesta';
    });
}

setFilterFromUrl();
</script>
{% endblock %}
