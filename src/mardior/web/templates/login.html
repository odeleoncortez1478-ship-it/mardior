<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARDIOR — Login</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-dark text-light" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div class="card" style="max-width:400px;width:100%;">
        <h1 style="text-align:center;margin-bottom:2rem;">🔐 MARDIOR</h1>
        <form hx-post="/api/auth/login" hx-target="body" hx-swap="outerHTML">
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" class="form-input" placeholder="Ingresa la contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Entrar</button>
        </form>
    </div>
</body>
</html>
